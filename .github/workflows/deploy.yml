name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /srv/projects
            cd /srv/projects
            if [ ! -d "tabara-group" ]; then
              git clone https://github.com/Nachiroumansour/Tabaragroup.git tabara-group
            fi
            cd tabara-group
            git pull origin main
            docker compose up -d --build
